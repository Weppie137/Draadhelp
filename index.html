<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draad & Passing Helper</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: #f5f5f5;
}

.hero {
  min-height: 100vh;
  padding: 30px;
  background:
    radial-gradient(circle at top, rgba(220,38,38,.25), transparent 35%),
    linear-gradient(rgba(0,0,0,.86), rgba(0,0,0,.96));
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 100%;
  max-width: 1050px;
  background: rgba(10,10,10,.96);
  border: 1px solid #991b1b;
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 0 60px rgba(220,38,38,.22);
}

.logo {
  width: 95px;
  height: 95px;
  border: 10px solid #991b1b;
  border-top-color: #ef4444;
  border-radius: 50%;
  margin-bottom: 20px;
  animation: spin 4s linear infinite;
  box-shadow: 0 0 35px rgba(239,68,68,.4);
}

h1 {
  margin: 0;
  font-size: 42px;
  color: #ef4444;
  text-transform: uppercase;
}

.subtitle {
  color: #d1d5db;
  margin: 10px 0 25px;
}

.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 22px;
}

.tab {
  background: #111;
  border: 1px solid #7f1d1d;
  color: #fff;
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.tab.active {
  background: #991b1b;
}

input {
  width: 100%;
  padding: 18px;
  font-size: 26px;
  border-radius: 15px;
  border: 2px solid #7f1d1d;
  background: #111;
  color: white;
  outline: none;
  text-transform: uppercase;
}

input:focus {
  border-color: #ef4444;
  box-shadow: 0 0 22px rgba(239,68,68,.35);
}

.examples {
  margin-top: 14px;
  color: #aaa;
  font-size: 14px;
}

.result {
  margin-top: 28px;
  display: none;
}

.tag {
  display: inline-block;
  padding: 7px 13px;
  border-radius: 999px;
  background: #7f1d1d;
  color: #fecaca;
  font-size: 13px;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.flip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 16px;
}

.flip-card {
  background: #111;
  border: 1px solid #991b1b;
  border-radius: 16px;
  overflow: hidden;
}

.flip-label {
  background: #7f1d1d;
  color: #fecaca;
  padding: 10px;
  font-size: 13px;
  text-transform: uppercase;
}

.flip-value {
  position: relative;
  padding: 24px 10px;
  font-size: 30px;
  font-weight: bold;
  text-align: center;
  background: linear-gradient(#222 0%, #080808 50%, #151515 51%, #050505 100%);
  animation: flip .55s ease;
}

.flip-value:before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 1px;
  background: #000;
  box-shadow: 0 1px 0 #333;
}

.note {
  margin-top: 18px;
  color: #aaa;
  font-size: 14px;
}

.error {
  padding: 18px;
  border: 1px solid #991b1b;
  background: #220909;
  color: #fecaca;
  border-radius: 14px;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
}

.calc-grid input {
  font-size: 20px;
  text-transform: none;
}

@keyframes flip {
  from { transform: rotateX(90deg); opacity: .2; }
  to { transform: rotateX(0deg); opacity: 1; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hidden { display: none; }

@media(max-width:650px) {
  h1 { font-size: 30px; }
  .flip-value { font-size: 25px; }
}
</style>
</head>

<body>
<div class="hero">
  <div class="card">
    <div class="logo"></div>

    <h1>Draad & Passing Helper</h1>
    <p class="subtitle">Werkplaats tool voor draad, passingen, toerental en voeding.</p>

    <div class="tabs">
      <button class="tab active" onclick="showTab('zoeken')">Zoeken</button>
      <button class="tab" onclick="showTab('rpm')">Toerental</button>
      <button class="tab" onclick="showTab('feed')">Voeding</button>
    </div>

    <div id="tab-zoeken">
      <input id="zoekveld" placeholder="Typ M10, MF10, G1/4, 25H7 of 25h6" oninput="zoeken()">
      <div class="examples">Voorbeelden: M10, M10x1.25, MF10, MF10x1, G1/4, R1/4, NPT1/4, 25H7, 25h6, 40g6</div>
      <div id="resultaat" class="result"></div>
    </div>

    <div id="tab-rpm" class="hidden">
      <div class="calc-grid">
        <input id="vc" type="number" placeholder="Vc in m/min" oninput="berekenRPM()">
        <input id="diameter" type="number" placeholder="Diameter in mm" oninput="berekenRPM()">
      </div>
      <div id="rpmResult" class="result"></div>
    </div>

    <div id="tab-feed" class="hidden">
      <div class="calc-grid">
        <input id="rpmInput" type="number" placeholder="Toerental rpm" oninput="berekenFeed()">
        <input id="zInput" type="number" placeholder="Aantal tanden Z" oninput="berekenFeed()">
        <input id="fzInput" type="number" step="0.01" placeholder="fz mm/tand" oninput="berekenFeed()">
      </div>
      <div id="feedResult" class="result"></div>
    </div>
  </div>
</div>

<script>
const draadTabel = {
  "M3": ["Metrische draad", 3, 0.5, 2.5],
  "M4": ["Metrische draad", 4, 0.7, 3.3],
  "M5": ["Metrische draad", 5, 0.8, 4.2],
  "M6": ["Metrische draad", 6, 1.0, 5.0],
  "M8": ["Metrische draad", 8, 1.25, 6.8],
  "M10": ["Metrische draad", 10, 1.5, 8.5],
  "M12": ["Metrische draad", 12, 1.75, 10.2],
  "M16": ["Metrische draad", 16, 2.0, 14.0],
  "M20": ["Metrische draad", 20, 2.5, 17.5],
  "M24": ["Metrische draad", 24, 3.0, 21.0],
  "M30": ["Metrische draad", 30, 3.5, 26.5],

  "M10X1": ["Metrische fijne draad", 10, 1.0, 9.0],
  "M10X1.25": ["Metrische fijne draad", 10, 1.25, 8.8],
  "M12X1.5": ["Metrische fijne draad", 12, 1.5, 10.5],
  "M16X1.5": ["Metrische fijne draad", 16, 1.5, 14.5],
  "M20X1.5": ["Metrische fijne draad", 20, 1.5, 18.5],

  "MF10": ["Metrische fijne draad", 10, 1.0, 9.0],
  "MF10X0.75": ["Metrische fijne draad", 10, 0.75, 9.25],
  "MF10X1": ["Metrische fijne draad", 10, 1.0, 9.0],
  "MF10X1.25": ["Metrische fijne draad", 10, 1.25, 8.8],
  "MF12": ["Metrische fijne draad", 12, 1.5, 10.5],
  "MF16": ["Metrische fijne draad", 16, 1.5, 14.5],
  "MF20": ["Metrische fijne draad", 20, 1.5, 18.5],

  "G1/8": ["BSP G draad", 9.728, 0.907, 8.8],
  "G1/4": ["BSP G draad", 13.157, 1.337, 11.8],
  "G3/8": ["BSP G draad", 16.662, 1.337, 15.25],
  "G1/2": ["BSP G draad", 20.955, 1.814, 19.0],

  "R1/8": ["BSP R conisch", 9.728, 0.907, 8.8],
  "R1/4": ["BSP R conisch", 13.157, 1.337, 11.8],
  "R3/8": ["BSP R conisch", 16.662, 1.337, 15.25],
  "R1/2": ["BSP R conisch", 20.955, 1.814, 19.0],

  "NPT1/8": ["NPT draad", 10.242, 0.941, 8.6],
  "NPT1/4": ["NPT draad", 13.616, 1.411, 11.1],
  "NPT3/8": ["NPT draad", 17.055, 1.411, 14.6],
  "NPT1/2": ["NPT draad", 21.223, 1.814, 17.9]
};

function showTab(tab) {
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("tab-zoeken").classList.add("hidden");
  document.getElementById("tab-rpm").classList.add("hidden");
  document.getElementById("tab-feed").classList.add("hidden");
  document.getElementById("tab-" + tab).classList.remove("hidden");
}

function zoeken() {
  const raw = document.getElementById("zoekveld").value.trim();
  const key = raw.toUpperCase().replace(/\s/g, "");
  const res = document.getElementById("resultaat");

  if (!key) {
    res.style.display = "none";
    return;
  }

  res.style.display = "block";

  if (draadTabel[key]) {
    const d = draadTabel[key];
    res.innerHTML = `
      <span class="tag">${d[0]}</span>
      <div class="flip-grid">
        <div class="flip-card"><div class="flip-label">Draad</div><div class="flip-value">${key}</div></div>
        <div class="flip-card"><div class="flip-label">Diameter</div><div class="flip-value">${d[1]} mm</div></div>
        <div class="flip-card"><div class="flip-label">Spoed</div><div class="flip-value">${d[2]} mm</div></div>
        <div class="flip-card"><div class="flip-label">Tapboor</div><div class="flip-value">${d[3]} mm</div></div>
      </div>
      <p class="note">Tapboor is praktijkwaarde. Controleer kritische draad altijd met officiële tabel.</p>
    `;
    return;
  }

  const m = raw.replace(/\s/g, "").match(/^(\d+(\.\d+)?)([A-Za-z]+)(\d+)$/);

  if (m) {
    const diameter = parseFloat(m[1]);
    const letter = m[3];
    const klasse = parseInt(m[4]);
    const isGat = letter === letter.toUpperCase();
    const it = berekenIT(diameter, klasse);

    if (!it) {
      res.innerHTML = `<div class="error">Deze IT klasse wordt nog niet ondersteund.</div>`;
      return;
    }

    let boven = 0;
    let onder = 0;
    let soort = isGat ? "Gatpassing" : "Aspassing";

    if (isGat && letter.toUpperCase() === "H") {
      onder = 0;
      boven = it;
    } else if (!isGat && letter === "h") {
      boven = 0;
      onder = -it;
    } else if (!isGat && letter === "g") {
      boven = -Math.round(2.5 * Math.pow(diameter, 0.34));
      onder = boven - it;
    } else if (!isGat && letter === "f") {
      boven = -Math.round(5.5 * Math.pow(diameter, 0.41));
      onder = boven - it;
    } else {
      res.innerHTML = `<div class="error">Ondersteund: H, h, g en f. Bijvoorbeeld 25H7, 25h6, 40g6.</div>`;
      return;
    }

    const min = diameter + onder / 1000;
    const max = diameter + boven / 1000;

    res.innerHTML = `
      <span class="tag">${soort}</span>
      <div class="flip-grid">
        <div class="flip-card"><div class="flip-label">Passing</div><div class="flip-value">${diameter}${letter}${klasse}</div></div>
        <div class="flip-card"><div class="flip-label">Onder</div><div class="flip-value">${onder} µm</div></div>
        <div class="flip-card"><div class="flip-label">Boven</div><div class="flip-value">${boven} µm</div></div>
        <div class="flip-card"><div class="flip-label">Min maat</div><div class="flip-value">${min.toFixed(3)} mm</div></div>
        <div class="flip-card"><div class="flip-label">Max maat</div><div class="flip-value">${max.toFixed(3)} mm</div></div>
      </div>
      <p class="note">Benadering volgens ISO passingformules. Voor eindcontrole officiële passingtabel gebruiken.</p>
    `;
    return;
  }

  res.innerHTML = `<div class="error">Geen resultaat voor <b>${raw}</b>.</div>`;
}

function berekenIT(d, klasse) {
  const i = 0.45 * Math.cbrt(d) + 0.001 * d;
  const f = {5:7, 6:10, 7:16, 8:25, 9:40, 10:64, 11:100, 12:160};
  return f[klasse] ? Math.round(i * f[klasse]) : null;
}

function berekenRPM() {
  const vc = parseFloat(document.getElementById("vc").value);
  const d = parseFloat(document.getElementById("diameter").value);
  const res = document.getElementById("rpmResult");

  if (!vc || !d) {
    res.style.display = "none";
    return;
  }

  const rpm = Math.round((vc * 1000) / (Math.PI * d));
  res.style.display = "block";
  res.innerHTML = `
    <span class="tag">Toerental</span>
    <div class="flip-grid">
      <div class="flip-card"><div class="flip-label">RPM</div><div class="flip-value">${rpm}</div></div>
    </div>
  `;
}

function berekenFeed() {
  const rpm = parseFloat(document.getElementById("rpmInput").value);
  const z = parseFloat(document.getElementById("zInput").value);
  const fz = parseFloat(document.getElementById("fzInput").value);
  const res = document.getElementById("feedResult");

  if (!rpm || !z || !fz) {
    res.style.display = "none";
    return;
  }

  const feed = Math.round(rpm * z * fz);
  res.style.display = "block";
  res.innerHTML = `
    <span class="tag">Voeding</span>
    <div class="flip-grid">
      <div class="flip-card"><div class="flip-label">Voeding</div><div class="flip-value">${feed} mm/min</div></div>
    </div>
  `;
}
</script>
</body>
</html>
