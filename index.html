<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNC Toolbox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <header class="topbar">
        <div>
          <h1>CNC TOOLBOX</h1>
          <p>Draad • Passingen • Radiuscompensatie • Toeren • Voeding</p>
        </div>
        <div class="cutter" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </header>

      <section class="search-panel">
        <label for="searchInput">Werkplaats zoekbalk</label>
        <input id="searchInput" type="text" autocomplete="off" placeholder="Typ M20 STAAL, M10, MF10, 25H7, G1/4, VC200 D80" />
        <div class="quick-examples">
          <button data-example="M20">M20</button>
          <button data-example="M20 STAAL">M20 STAAL</button>
          <button data-example="M10">M10</button>
          <button data-example="MF10">MF10</button>
          <button data-example="25H7">25H7</button>
          <button data-example="G1/4">G1/4</button>
          <button data-example="VC200 D80">VC200 D80</button>
          <button data-example="RPM800 Z8 FZ0.15">RPM800 Z8 FZ0.15</button>
        </div>
      </section>

      <section id="result" class="result empty">
        <div class="empty-state">
          <strong>Typ een maat of berekening.</strong>
          <span>Bijvoorbeeld M20 STAAL voor draadgegevens + radiuscompensatie.</span>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
