<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNC Toolbox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <header class="topbar">
        <div>
          <h1>CNC TOOLBOX</h1>
          <p>Draad • Passingen • Radiuscompensatie • Toeren • Voeding</p>
        </div>
        <div class="cutter" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </header>

      <section class="search-panel">
        <label for="searchInput">Werkplaats zoekbalk</label>
        <input id="searchInput" type="text" autocomplete="off" placeholder="M20 STAAL  |  25H7  |  VC200 D80  |  RPM800 Z8 FZ0.15" />
        <div class="syntax-line">
          <span>Draad: M10 / M20 STAAL</span>
          <span>Passing: 25H7</span>
          <span>Toeren: VC200 D80</span>
          <span>Voeding: RPM800 Z8 FZ0.15</span>
        </div>
      </section>

      <section id="result" class="result empty">
        <div class="empty-state">
          <strong>Typ in één zoekbalk wat je nodig hebt.</strong>
          <span>M20 STAAL = draad + radiuscompensatie. VC200 D80 = toerental. RPM800 Z8 FZ0.15 = voeding.</span>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
